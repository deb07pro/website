
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;min-height:100vh;width:100%}
#app{font-family:'Share Tech Mono',monospace;background:#000;color:#00ff41;padding:12px;border:1px solid #005c18;width:100%;min-height:100vh}
#titlebar{font-family:'VT323',monospace;font-size:clamp(18px,4vw,28px);color:#00ff41;border-bottom:1px solid #005c18;padding-bottom:6px;margin-bottom:8px;letter-spacing:2px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
#titlebar span{font-size:clamp(10px,2vw,13px);color:#005c18;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
#statusbar{display:flex;gap:12px;font-size:clamp(11px,2.5vw,13px);color:#005c18;margin-bottom:8px;border:1px solid #005c18;padding:4px 8px;flex-wrap:wrap}
#statusbar .val{color:#00ff41;font-size:clamp(12px,2.8vw,15px)}
.diff-btns{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.btn{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2.2vw,12px);background:#000;color:#005c18;border:1px solid #005c18;padding:4px 8px;cursor:pointer;letter-spacing:1px;transition:all 0.1s;white-space:nowrap}
.btn:hover,.btn.active{color:#00ff41;border-color:#00ff41}
#controls{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
#grid-wrap{width:100%;overflow:auto;-webkit-overflow-scrolling:touch}
#grid{display:inline-grid;border:1px solid #005c18;gap:0;touch-action:none}
.cell{display:flex;align-items:center;justify-content:center;border:1px solid #001500;cursor:pointer;font-family:'Share Tech Mono',monospace;transition:background 0.05s;line-height:1}
.cell.hidden{background:#001a07;color:#005c18}
.cell.hidden:hover,.cell.hidden:active{background:#002d0f;color:#00ff41}
.cell.flagged{background:#001a07;color:#ffff00}
.cell.revealed{background:#000;cursor:default}
.cell.revealed.mine{background:#1a0000;color:#ff3333}
.cell.revealed.mine.trigger{background:#330000}
.n1{color:#00ff41}.n2{color:#00ffff}.n3{color:#ff9900}.n4{color:#ff66ff}.n5{color:#ff3333}.n6{color:#00ffff}.n7{color:#fff}.n8{color:#888}
#msg{margin-top:8px;font-size:clamp(11px,2.5vw,13px);min-height:18px;border-top:1px solid #005c18;padding-top:5px;letter-spacing:1px;word-break:break-word}
#msg.win{color:#00ff41}#msg.lose{color:#ff3333}#msg.info{color:#005c18}
</style>

<div id="app">
  <div id="titlebar">
    <span style="color:#00ff41;font-family:'VT323',monospace;font-size:inherit">&#9556;&#9552; MINESWEEPER.EXE &#9552;&#9559;</span>
    <span>RIGHT-CLICK / LONG-PRESS = FLAG</span>
  </div>
  <div class="diff-btns">
    <button class="btn active" id="d-easy" onclick="setDiff('easy')">[EASY 9x9]</button>
    <button class="btn" id="d-med" onclick="setDiff('med')">[MED 16x16]</button>
    <button class="btn" id="d-hard" onclick="setDiff('hard')">[HARD 16x30]</button>
  </div>
  <div id="statusbar">
    <span>MINES:<span class="val" id="mine-count"> --</span></span>
    <span>FLAGS:<span class="val" id="flag-count"> 0</span></span>
    <span>TIME:<span class="val" id="timer"> 000</span>s</span>
    <span>STATUS:<span class="val" id="status-txt"> READY</span></span>
  </div>
  <div id="controls">
    <button class="btn" onclick="newGame()">[NEW GAME]</button>
    <button class="btn" onclick="revealAll()">[REVEAL]</button>
  </div>
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="msg" class="info">&gt; Click any cell to begin. Right-click / long-press to flag.</div>
</div>

<script>
const DIFFS={easy:{rows:9,cols:9,mines:10},med:{rows:16,cols:16,mines:40},hard:{rows:16,cols:30,mines:99}};
let diff='easy',rows,cols,mines,board,revealed,flagged,gameOver,gameWon,started,timerInterval,seconds,firstClick;

function cellSize(){
  const wrap=document.getElementById('grid-wrap');
  const avail=wrap.clientWidth-2;
  const D=DIFFS[diff];
  const fit=Math.floor(avail/D.cols);
  return Math.max(20,Math.min(fit,36));
}

function setDiff(d){
  diff=d;
  ['easy','med','hard'].forEach(x=>document.getElementById('d-'+x).classList.toggle('active',x===d));
  newGame();
}

function newGame(){
  clearInterval(timerInterval);
  const D=DIFFS[diff];
  rows=D.rows;cols=D.cols;mines=D.mines;
  board=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(false));
  gameOver=false;gameWon=false;started=false;firstClick=true;seconds=0;
  document.getElementById('mine-count').textContent=' '+mines;
  document.getElementById('flag-count').textContent=' 0';
  document.getElementById('timer').textContent=' 000';
  const st=document.getElementById('status-txt');
  st.textContent=' READY';st.style.color='';
  setMsg('&gt; Click any cell to begin. Right-click / long-press to flag.','info');
  renderGrid();
}

function placeMines(sr,sc){
  let placed=0;
  while(placed<mines){
    const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(board[r][c]===-1)continue;
    if(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;
    board[r][c]=-1;placed++;
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(board[r][c]===-1)continue;
    let n=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]===-1)n++;}
    board[r][c]=n;
  }
}

function renderGrid(){
  const g=document.getElementById('grid');
  const sz=cellSize();
  const fs=Math.max(10,Math.floor(sz*0.52));
  g.style.gridTemplateColumns=`repeat(${cols},${sz}px)`;
  g.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.style.cssText=`width:${sz}px;height:${sz}px;font-size:${fs}px`;
    cell.dataset.r=r;cell.dataset.c=c;
    styleCell(cell,r,c,fs);
    cell.addEventListener('click',()=>handleClick(r,c));
    cell.addEventListener('contextmenu',e=>{e.preventDefault();handleFlag(r,c);});
    addLongPress(cell,r,c);
    g.appendChild(cell);
  }
}

function addLongPress(cell,r,c){
  let t;
  cell.addEventListener('touchstart',e=>{t=setTimeout(()=>{e.preventDefault();handleFlag(r,c);},500)},{passive:true});
  cell.addEventListener('touchend',()=>clearTimeout(t));
  cell.addEventListener('touchmove',()=>clearTimeout(t));
}

function getCell(r,c){return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`)}
function getFontSize(){const c=document.querySelector('.cell');return c?parseInt(c.style.fontSize)||13:13}

function styleCell(cell,r,c,fs){
  fs=fs||getFontSize();
  if(revealed[r][c]){
    cell.className='cell revealed';
    const v=board[r][c];
    if(v===-1){cell.textContent='*';cell.classList.add('mine');}
    else if(v===0){cell.textContent='·';cell.style.color='#002a00';}
    else{cell.textContent=v;cell.classList.add('n'+v);}
  } else if(flagged[r][c]){
    cell.className='cell flagged';cell.textContent='F';
  } else {
    cell.className='cell hidden';cell.textContent='#';
  }
  cell.style.fontSize=fs+'px';
}

function handleClick(r,c){
  if(gameOver||gameWon||flagged[r][c]||revealed[r][c])return;
  if(firstClick){
    firstClick=false;placeMines(r,c);started=true;
    timerInterval=setInterval(()=>{seconds++;document.getElementById('timer').textContent=' '+String(seconds).padStart(3,'0');},1000);
    document.getElementById('status-txt').textContent=' RUNNING';
  }
  if(board[r][c]===-1){revealMine(r,c);return;}
  flood(r,c);checkWin();
}

function handleFlag(r,c){
  if(gameOver||gameWon||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  styleCell(getCell(r,c),r,c);
  document.getElementById('flag-count').textContent=' '+flagged.flat().filter(Boolean).length;
}

function flood(r,c){
  if(r<0||r>=rows||c<0||c>=cols||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  styleCell(getCell(r,c),r,c);
  if(board[r][c]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)flood(r+dr,c+dc);
}

function revealMine(r,c){
  clearInterval(timerInterval);gameOver=true;
  revealed[r][c]=true;
  const tc=getCell(r,c);tc.className='cell revealed mine trigger';tc.textContent='*';
  for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++){
    if(board[rr][cc]===-1&&!(rr===r&&cc===c)){
      revealed[rr][cc]=true;const mc=getCell(rr,cc);mc.className='cell revealed mine';mc.textContent='*';
    }
  }
  const st=document.getElementById('status-txt');st.textContent=' DEAD';st.style.color='#ff3333';
  setMsg('&gt; [FATAL] You hit a mine. GAME OVER. Press [NEW GAME] to restart.','lose');
}

function checkWin(){
  let safe=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(revealed[r][c]&&board[r][c]!==-1)safe++;
  if(safe===rows*cols-mines){
    clearInterval(timerInterval);gameWon=true;
    const st=document.getElementById('status-txt');st.textContent=' CLEAR!';st.style.color='#00ff41';
    setMsg(`&gt; [SUCCESS] All mines cleared in ${seconds}s. Well played.`,'win');
  }
}

function revealAll(){
  if(!started)return;
  clearInterval(timerInterval);gameOver=true;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){revealed[r][c]=true;styleCell(getCell(r,c),r,c);}
  setMsg('&gt; Board revealed.','info');
}

function setMsg(html,cls){const m=document.getElementById('msg');m.innerHTML=html;m.className=cls;}

let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{renderGrid();},120);});

newGame();
</script>
